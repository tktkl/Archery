<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人员-项目 多对多 管理与可视化</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #151a2d;
      --panel-2: #1b2240;
      --text: #dbe5ff;
      --muted: #9fb0ffbb;
      --accent: #6ea8fe;
      --accent-2: #8bd6ff;
      --danger: #ff6b6b;
      --warn: #ffd166;
      --ok: #06d6a0;
      --border: #2a325a;
      --chip: #23305c;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 10% 10%, #111735 0%, var(--bg) 55%);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
    }

    aside {
      border-right: 1px solid var(--border);
      background: linear-gradient(180deg, #121735, #0f1430);
      padding: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      letter-spacing: .3px;
      margin-bottom: 10px;
    }
    .brand .dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 0 18px #6ea8fe88; }

    .menu {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .menu button {
      all: unset;
      background: var(--panel);
      padding: 12px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      color: var(--text);
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
    }

    .menu button:hover { background: #182045; border-color: #33407a; }
    .menu button.active { background: #202a5a; border-color: #4050a0; box-shadow: inset 0 0 0 1px #5366d6, 0 0 0 2px #39478a55; }

    main {
      overflow: auto;
      padding: 18px 18px 60px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #e6ecff;
    }

    .panel {
      background: linear-gradient(180deg, #141a38 0%, #131833 100%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 6px 28px #0b0f25cc;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    .inputs-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    input[type="text"], input[type="date"], select, textarea {
      background: #0e1431;
      color: var(--text);
      border: 1px solid #2a3766;
      border-radius: 10px;
      padding: 10px 12px;
      outline: none;
      min-width: 160px;
    }
    textarea { width: 100%; min-height: 64px; resize: vertical; }

    .btn {
      all: unset;
      background: #1a2350;
      color: #dce7ff;
      padding: 10px 14px;
      border: 1px solid #31407a;
      border-radius: 10px;
      cursor: pointer;
    }
    .btn:hover { background: #22306e; border-color: #3f54a8; }
    .btn.ok { background: #0f3a2f; border-color: #145e4b; }
    .btn.ok:hover { background: #115140; }
    .btn.danger { background: #4a1b25; border-color: #7a2f3b; color: #ffd9df; }
    .btn.danger:hover { background: #6a2230; }
    .btn.ghost { background: transparent; }

    .list {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #223064; background: #0e1431; }
    .row:nth-child(even) { background: #0e1436; }
    .row:last-child { border-bottom: none; }
    .row .ops { display: flex; gap: 8px; }

    .muted { color: var(--muted); font-size: 12px; }
    .chip { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; background: var(--chip); color: #ccdcff; border: 1px solid #32407a; }

    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tabs button { all: unset; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; }
    .tabs button.active { background: #1a2350; border-color: #3b4a8a; }

    .section { display: none; }
    .section.active { display: block; }

    .group { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .group h3 { margin: 0; padding: 10px 12px; background: #15204a; border-bottom: 1px solid #2a3766; font-size: 15px; }
    .group .item { padding: 10px 12px; border-bottom: 1px solid #1c2658; }
    .group .item:last-child { border-bottom: none; }

    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }

    /* 可视化 */
    .viz-wrap { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; align-items: stretch; }
    .viz-col { border: 1px solid var(--border); border-radius: 10px; overflow: auto; background: #0f1534; }
    .viz-col h4 { margin: 0; padding: 8px 10px; border-bottom: 1px solid var(--border); background: #15204a; }
    .viz-list { padding: 8px; display: grid; gap: 6px; }
    .viz-item { padding: 6px 8px; border: 1px solid #2a3766; border-radius: 8px; cursor: pointer; }
    .viz-item.active { background: #1a2350; border-color: #3b4a8a; }
    .viz-center { display: grid; grid-template-rows: auto 1fr; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #0f1534; }
    .viz-center h4 { margin: 0; padding: 8px 10px; border-bottom: 1px solid var(--border); background: #15204a; }
    svg { width: 100%; height: 100%; background: #0a0f2a; }
    .link { stroke: #6ea8fe88; stroke-width: 1.5; }
    .link.highlight { stroke: #8bd6ff; stroke-width: 2.5; }

    .help { font-size: 12px; color: var(--muted); }
    .spacer { height: 8px; }
    .right { margin-left: auto; }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand"><span class="dot"></span> 多对多管理台</div>
      <div class="menu">
        <button data-section="manage" class="active">左侧菜单一 · 数据录入与管理</button>
        <button data-section="detail">左侧菜单二 · 详情查看</button>
        <button data-section="viz">左侧菜单三 · 关系图谱</button>
      </div>
      <div class="spacer"></div>
      <div class="panel">
        <div class="inputs-row">
          <button class="btn" id="seedBtn">导入示例数据</button>
          <button class="btn danger" id="clearBtn">清空所有数据</button>
        </div>
        <div class="spacer"></div>
        <div class="help">数据存储在浏览器 localStorage 中，在以 file:// 方式打开也可持久化。可在隐私模式或清空缓存后丢失。</div>
      </div>
    </aside>
    <main>
      <!-- 管理区 -->
      <section id="sec-manage" class="section active">
        <h2>数据录入与管理</h2>
        <div class="tabs" id="manageTabs">
          <button data-tab="people" class="active">人员</button>
          <button data-tab="projects">项目</button>
          <button data-tab="tasks">任务关联</button>
        </div>

        <div id="tab-people" class="panel">
          <div class="inputs-row" id="peopleForm">
            <input type="text" id="personName" placeholder="人员姓名" />
            <input type="text" id="personRole" placeholder="角色/标签（可选）" />
            <button class="btn ok" id="addPersonBtn">新增人员</button>
          </div>
          <div class="list" id="peopleList"></div>
        </div>

        <div id="tab-projects" class="panel" style="display:none;">
          <div class="inputs-row" id="projectForm">
            <input type="text" id="projectName" placeholder="项目名称" />
            <input type="text" id="projectDesc" placeholder="描述（可选）" />
            <button class="btn ok" id="addProjectBtn">新增项目</button>
          </div>
          <div class="list" id="projectsList"></div>
        </div>

        <div id="tab-tasks" class="panel" style="display:none;">
          <div class="grid-3">
            <div class="inputs-row">
              <select id="taskPerson"></select>
              <select id="taskProject"></select>
            </div>
            <div class="inputs-row">
              <input type="date" id="taskDate" />
              <input type="text" id="taskTitle" placeholder="任务标题/内容" />
            </div>
            <div class="inputs-row">
              <button class="btn ok" id="addTaskBtn">新增任务关联</button>
            </div>
          </div>
          <div class="list" id="tasksList"></div>
        </div>
      </section>

      <!-- 详情区 -->
      <section id="sec-detail" class="section">
        <h2>详情查看</h2>
        <div class="panel">
          <div class="toolbar">
            <label><input type="radio" name="detailMode" value="person" checked /> 按人员</label>
            <label><input type="radio" name="detailMode" value="project" /> 按项目</label>

            <select id="detailSelector"></select>

            <div class="right"></div>
            <span class="muted">时间排序：</span>
            <button class="btn" id="sortAscBtn">升序</button>
            <button class="btn" id="sortDescBtn">降序</button>
          </div>
        </div>
        <div class="spacer"></div>
        <div id="detailContent" class="grid-2"></div>
      </section>

      <!-- 可视化区 -->
      <section id="sec-viz" class="section">
        <h2>项目-人员 关系图谱</h2>
        <div class="panel viz-wrap">
          <div class="viz-col">
            <h4>人员</h4>
            <div id="vizPeople" class="viz-list"></div>
          </div>
          <div class="viz-center">
            <h4>连接（至少存在一条任务）</h4>
            <svg id="vizSvg" preserveAspectRatio="xMidYMid meet"></svg>
          </div>
          <div class="viz-col">
            <h4>项目</h4>
            <div id="vizProjects" class="viz-list"></div>
          </div>
        </div>
        <div class="spacer"></div>
        <div class="help">点击左/右两侧列表高亮相关连接；数据变化将自动更新。</div>
      </section>
    </main>
  </div>

  <script>
    // ====== 数据层（localStorage） ======
    const STORAGE_KEYS = {
      people: 'm2m_people',
      projects: 'm2m_projects',
      tasks: 'm2m_tasks'
    };

    function uid(prefix = 'id') {
      return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    }

    function loadAll() {
      const people = JSON.parse(localStorage.getItem(STORAGE_KEYS.people) || '[]');
      const projects = JSON.parse(localStorage.getItem(STORAGE_KEYS.projects) || '[]');
      const tasks = JSON.parse(localStorage.getItem(STORAGE_KEYS.tasks) || '[]');
      return { people, projects, tasks };
    }

    function saveAll(data) {
      localStorage.setItem(STORAGE_KEYS.people, JSON.stringify(data.people));
      localStorage.setItem(STORAGE_KEYS.projects, JSON.stringify(data.projects));
      localStorage.setItem(STORAGE_KEYS.tasks, JSON.stringify(data.tasks));
    }

    function setPeople(people) { localStorage.setItem(STORAGE_KEYS.people, JSON.stringify(people)); }
    function setProjects(projects) { localStorage.setItem(STORAGE_KEYS.projects, JSON.stringify(projects)); }
    function setTasks(tasks) { localStorage.setItem(STORAGE_KEYS.tasks, JSON.stringify(tasks)); }

    // ====== 工具函数 ======
    function byId(id) { return document.getElementById(id); }
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function sortByDate(arr, key, asc = true) {
      return arr.slice().sort((a, b) => {
        const da = new Date(a[key] || 0).getTime();
        const db = new Date(b[key] || 0).getTime();
        return asc ? da - db : db - da;
      });
    }

    // ====== 状态 ======
    const state = {
      selectedSection: 'manage',
      manageTab: 'people',
      detailMode: 'person',
      detailId: null,
      sortAsc: true,
      highlight: { personId: null, projectId: null },
    };

    // ====== 渲染 ======
    function renderAll() {
      renderMenu();
      renderTabs();
      renderPeople();
      renderProjects();
      renderTasks();
      renderTaskSelectors();
      renderDetailToolbar();
      renderDetail();
      renderViz();
    }

    function renderMenu() {
      document.querySelectorAll('.menu button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.section === state.selectedSection);
      });
      document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
      byId('sec-' + state.selectedSection).classList.add('active');
    }

    function renderTabs() {
      const tabs = byId('manageTabs').querySelectorAll('button');
      tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.manageTab));
      // show/hide
      byId('tab-people').style.display = state.manageTab === 'people' ? '' : 'none';
      byId('tab-projects').style.display = state.manageTab === 'projects' ? '' : 'none';
      byId('tab-tasks').style.display = state.manageTab === 'tasks' ? '' : 'none';
    }

    function renderPeople() {
      const { people, tasks } = loadAll();
      const container = byId('peopleList');
      container.innerHTML = '';
      if (people.length === 0) {
        container.innerHTML = `<div class="row"><div class="muted">暂无人员</div></div>`;
        return;
      }
      people.forEach(p => {
        const count = tasks.filter(t => t.personId === p.id).length;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div>
            <div><strong>${escapeHtml(p.name)}</strong> ${p.role ? `<span class="chip">${escapeHtml(p.role)}</span>` : ''}</div>
            <div class="muted">任务数：${count}</div>
          </div>
          <div class="ops">
            <button class="btn" data-op="edit" data-id="${p.id}">编辑</button>
            <button class="btn danger" data-op="delete" data-id="${p.id}">删除</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function renderProjects() {
      const { projects, tasks } = loadAll();
      const container = byId('projectsList');
      container.innerHTML = '';
      if (projects.length === 0) {
        container.innerHTML = `<div class="row"><div class="muted">暂无项目</div></div>`;
        return;
      }
      projects.forEach(p => {
        const count = tasks.filter(t => t.projectId === p.id).length;
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div>
            <div><strong>${escapeHtml(p.name)}</strong> ${p.desc ? `<span class="chip">${escapeHtml(p.desc)}</span>` : ''}</div>
            <div class="muted">任务数：${count}</div>
          </div>
          <div class="ops">
            <button class="btn" data-op="editProject" data-id="${p.id}">编辑</button>
            <button class="btn danger" data-op="deleteProject" data-id="${p.id}">删除</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function renderTasks() {
      const { tasks, people, projects } = loadAll();
      const container = byId('tasksList');
      container.innerHTML = '';
      if (tasks.length === 0) {
        container.innerHTML = `<div class="row"><div class="muted">暂无任务关联</div></div>`;
        return;
      }
      const personMap = Object.fromEntries(people.map(p => [p.id, p]));
      const projectMap = Object.fromEntries(projects.map(p => [p.id, p]));
      sortByDate(tasks, 'date', true).forEach(t => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
          <div>
            <div><strong>${escapeHtml(t.title || '')}</strong></div>
            <div class="muted">人员：${escapeHtml(personMap[t.personId]?.name || '已删除')} ｜ 项目：${escapeHtml(projectMap[t.projectId]?.name || '已删除')} ｜ 日期：${formatDate(t.date)}</div>
          </div>
          <div class="ops">
            <button class="btn" data-op="editTask" data-id="${t.id}">编辑</button>
            <button class="btn danger" data-op="deleteTask" data-id="${t.id}">删除</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    function renderTaskSelectors() {
      const { people, projects } = loadAll();
      const personSel = byId('taskPerson');
      const projectSel = byId('taskProject');
      personSel.innerHTML = people.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
      projectSel.innerHTML = projects.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
    }

    function renderDetailToolbar() {
      const { people, projects } = loadAll();
      const selector = byId('detailSelector');
      let options = [];
      if (state.detailMode === 'person') {
        options = people.map(p => ({ id: p.id, label: p.name }));
        if (!options.find(o => o.id === state.detailId)) state.detailId = options[0]?.id || null;
      } else {
        options = projects.map(p => ({ id: p.id, label: p.name }));
        if (!options.find(o => o.id === state.detailId)) state.detailId = options[0]?.id || null;
      }
      selector.innerHTML = options.map(o => `<option value="${o.id}">${escapeHtml(o.label)}</option>`).join('');
      if (state.detailId) selector.value = state.detailId;
      // radio
      document.querySelectorAll('input[name="detailMode"]').forEach(r => {
        r.checked = r.value === state.detailMode;
      });
      byId('sortAscBtn').classList.toggle('ok', state.sortAsc);
      byId('sortDescBtn').classList.toggle('ok', !state.sortAsc);
    }

    function renderDetail() {
      const wrap = byId('detailContent');
      wrap.innerHTML = '';
      const { people, projects, tasks } = loadAll();
      const personMap = Object.fromEntries(people.map(p => [p.id, p]));
      const projectMap = Object.fromEntries(projects.map(p => [p.id, p]));

      if (!state.detailId) {
        wrap.innerHTML = '<div class="panel">暂无数据</div>';
        return;
      }

      if (state.detailMode === 'person') {
        const person = personMap[state.detailId];
        const personTasks = tasks.filter(t => t.personId === state.detailId);
        const byProject = {};
        personTasks.forEach(t => {
          const pid = t.projectId;
          byProject[pid] = byProject[pid] || [];
          byProject[pid].push(t);
        });
        const projIds = Object.keys(byProject);
        if (projIds.length === 0) {
          wrap.innerHTML = `<div class="panel">人员 <strong>${escapeHtml(person?.name || '')}</strong> 暂无任务</div>`;
          return;
        }
        projIds.forEach(pid => {
          const group = document.createElement('div');
          group.className = 'group';
          const title = projectMap[pid]?.name || '已删除项目';
          group.innerHTML = `<h3>项目：${escapeHtml(title)}</h3>`;
          const sorted = sortByDate(byProject[pid], 'date', state.sortAsc);
          sorted.forEach(t => {
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `<div><strong>${escapeHtml(t.title || '')}</strong> <span class="muted">${formatDate(t.date)}</span></div>`;
            group.appendChild(item);
          });
          wrap.appendChild(group);
        });
      } else {
        const project = projectMap[state.detailId];
        const projectTasks = tasks.filter(t => t.projectId === state.detailId);
        const byPerson = {};
        projectTasks.forEach(t => {
          const pid = t.personId;
          byPerson[pid] = byPerson[pid] || [];
          byPerson[pid].push(t);
        });
        const personIds = Object.keys(byPerson);
        if (personIds.length === 0) {
          wrap.innerHTML = `<div class="panel">项目 <strong>${escapeHtml(project?.name || '')}</strong> 暂无任务</div>`;
          return;
        }
        personIds.forEach(pid => {
          const group = document.createElement('div');
          group.className = 'group';
          const title = personMap[pid]?.name || '已删除人员';
          group.innerHTML = `<h3>人员：${escapeHtml(title)}</h3>`;
          const sorted = sortByDate(byPerson[pid], 'date', state.sortAsc);
          sorted.forEach(t => {
            const item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = `<div><strong>${escapeHtml(t.title || '')}</strong> <span class="muted">${formatDate(t.date)}</span></div>`;
            group.appendChild(item);
          });
          wrap.appendChild(group);
        });
      }
    }

    function renderViz() {
      const { people, projects, tasks } = loadAll();
      const left = byId('vizPeople');
      const right = byId('vizProjects');
      const svg = byId('vizSvg');
      left.innerHTML = people.map(p => `<div class="viz-item ${state.highlight.personId === p.id ? 'active' : ''}" data-id="${p.id}" data-type="person">${escapeHtml(p.name)}</div>`).join('');
      right.innerHTML = projects.map(p => `<div class="viz-item ${state.highlight.projectId === p.id ? 'active' : ''}" data-id="${p.id}" data-type="project">${escapeHtml(p.name)}</div>`).join('');

      // compute connections (unique person-project having at least one task)
      const keySet = new Set(tasks.map(t => `${t.personId}__${t.projectId}`));

      // layout params
      const padding = 16;
      const rowHeight = 34;
      const leftW = left.clientWidth || 240;
      const rightW = right.clientWidth || 240;
      const centerW = svg.clientWidth || 600;
      const height = Math.max(people.length, projects.length) * rowHeight + padding * 2;
      svg.setAttribute('viewBox', `0 0 ${centerW} ${height}`);
      svg.innerHTML = '';

      const personPos = {};
      const projectPos = {};
      people.forEach((p, i) => { personPos[p.id] = { x: padding, y: padding + i * rowHeight + rowHeight / 2 }; });
      projects.forEach((p, i) => { projectPos[p.id] = { x: centerW - padding, y: padding + i * rowHeight + rowHeight / 2 }; });

      keySet.forEach(key => {
        const [pid, prid] = key.split('__');
        const pl = personPos[pid];
        const pr = projectPos[prid];
        if (!pl || !pr) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', pl.x);
        line.setAttribute('y1', pl.y);
        line.setAttribute('x2', pr.x);
        line.setAttribute('y2', pr.y);
        line.classList.add('link');
        const highlight = (state.highlight.personId === pid) || (state.highlight.projectId === prid);
        if (highlight) line.classList.add('highlight');
        svg.appendChild(line);
      });
    }

    // ====== 事件绑定（阻止表单提交 & 停止冒泡） ======
    function preventFormSubmission() {
      document.querySelectorAll('form').forEach(f => {
        f.addEventListener('submit', e => { e.preventDefault(); e.stopPropagation(); });
      });
    }

    // 统一转义
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    // ====== 初始化与交互 ======
    function init() {
      // 左侧菜单
      document.querySelectorAll('.menu button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          state.selectedSection = btn.dataset.section;
          renderMenu();
        });
      });

      // 管理 tabs
      byId('manageTabs').querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          state.manageTab = btn.dataset.tab;
          renderTabs();
        });
      });

      // 新增人员（避免 form 提交）
      byId('addPersonBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const name = byId('personName').value.trim();
        const role = byId('personRole').value.trim();
        if (!name) return;
        const data = loadAll();
        data.people.push({ id: uid('p'), name, role });
        setPeople(data.people);
        byId('personName').value = '';
        byId('personRole').value = '';
        renderPeople();
        renderTaskSelectors();
        renderDetailToolbar();
        renderViz();
      });

      // 人员列表操作（编辑/删除）
      byId('peopleList').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const op = target.getAttribute('data-op');
        if (!op) return;
        e.preventDefault(); e.stopPropagation(); // 防止冒泡
        const id = target.getAttribute('data-id');
        const data = loadAll();
        if (op === 'delete') {
          if (!confirm('删除该人员将同时删除其关联的任务，确定删除？')) return;
          data.people = data.people.filter(p => p.id !== id);
          data.tasks = data.tasks.filter(t => t.personId !== id);
          saveAll(data);
          renderAll();
          return;
        }
        if (op === 'edit') {
          const p = data.people.find(x => x.id === id);
          if (!p) return;
          const name = prompt('人员姓名：', p.name);
          if (name == null) return;
          const role = prompt('角色/标签（可选）：', p.role || '');
          p.name = name.trim() || p.name;
          p.role = (role || '').trim();
          setPeople(data.people);
          renderPeople();
          renderTaskSelectors();
          renderDetailToolbar();
          renderViz();
        }
      });

      // 新增项目
      byId('addProjectBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const name = byId('projectName').value.trim();
        const desc = byId('projectDesc').value.trim();
        if (!name) return;
        const data = loadAll();
        data.projects.push({ id: uid('prj'), name, desc });
        setProjects(data.projects);
        byId('projectName').value = '';
        byId('projectDesc').value = '';
        renderProjects();
        renderTaskSelectors();
        renderDetailToolbar();
        renderViz();
      });

      // 项目列表操作
      byId('projectsList').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const op = target.getAttribute('data-op');
        if (!op) return;
        e.preventDefault(); e.stopPropagation();
        const id = target.getAttribute('data-id');
        const data = loadAll();
        if (op === 'deleteProject') {
          if (!confirm('删除该项目将同时删除其关联的任务，确定删除？')) return;
          data.projects = data.projects.filter(p => p.id !== id);
          data.tasks = data.tasks.filter(t => t.projectId !== id);
          saveAll(data);
          renderAll();
          return;
        }
        if (op === 'editProject') {
          const p = data.projects.find(x => x.id === id);
          if (!p) return;
          const name = prompt('项目名称：', p.name);
          if (name == null) return;
          const desc = prompt('描述（可选）：', p.desc || '');
          p.name = name.trim() || p.name;
          p.desc = (desc || '').trim();
          setProjects(data.projects);
          renderProjects();
          renderTaskSelectors();
          renderDetailToolbar();
          renderViz();
        }
      });

      // 新增任务
      byId('addTaskBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        const personId = byId('taskPerson').value;
        const projectId = byId('taskProject').value;
        const date = byId('taskDate').value || new Date().toISOString().slice(0, 10);
        const title = byId('taskTitle').value.trim();
        if (!personId || !projectId || !title) return;
        const data = loadAll();
        data.tasks.push({ id: uid('t'), personId, projectId, date, title });
        setTasks(data.tasks);
        byId('taskTitle').value = '';
        renderTasks();
        renderDetail();
        renderViz();
      });

      // 任务列表操作
      byId('tasksList').addEventListener('click', (e) => {
        const target = e.target;
        if (!(target instanceof HTMLElement)) return;
        const op = target.getAttribute('data-op');
        if (!op) return;
        e.preventDefault(); e.stopPropagation();
        const id = target.getAttribute('data-id');
        const data = loadAll();
        if (op === 'deleteTask') {
          if (!confirm('确定删除该任务记录？')) return;
          data.tasks = data.tasks.filter(t => t.id !== id);
          setTasks(data.tasks);
          renderTasks();
          renderDetail();
          renderViz();
          return;
        }
        if (op === 'editTask') {
          const t = data.tasks.find(x => x.id === id);
          if (!t) return;
          const title = prompt('任务标题：', t.title || '');
          if (title == null) return;
          const date = prompt('日期（YYYY-MM-DD）：', t.date || '');
          if (date) t.date = date;
          t.title = title.trim() || t.title;
          setTasks(data.tasks);
          renderTasks();
          renderDetail();
          renderViz();
        }
      });

      // 详情切换
      document.querySelectorAll('input[name="detailMode"]').forEach(r => {
        r.addEventListener('change', (e) => {
          e.stopPropagation();
          state.detailMode = r.value;
          state.detailId = null;
          renderDetailToolbar();
          renderDetail();
        });
      });

      byId('detailSelector').addEventListener('change', (e) => {
        e.stopPropagation();
        const sel = e.target;
        state.detailId = sel.value || null;
        renderDetail();
      });

      byId('sortAscBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        state.sortAsc = true;
        renderDetailToolbar();
        renderDetail();
      });
      byId('sortDescBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        state.sortAsc = false;
        renderDetailToolbar();
        renderDetail();
      });

      // 可视化交互
      byId('vizPeople').addEventListener('click', (e) => {
        const el = e.target;
        if (!(el instanceof HTMLElement)) return;
        const id = el.getAttribute('data-id');
        if (!id) return;
        e.preventDefault(); e.stopPropagation();
        state.highlight.personId = state.highlight.personId === id ? null : id;
        renderViz();
      });
      byId('vizProjects').addEventListener('click', (e) => {
        const el = e.target;
        if (!(el instanceof HTMLElement)) return;
        const id = el.getAttribute('data-id');
        if (!id) return;
        e.preventDefault(); e.stopPropagation();
        state.highlight.projectId = state.highlight.projectId === id ? null : id;
        renderViz();
      });

      // 示例与清空
      byId('seedBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        seedData();
        renderAll();
      });
      byId('clearBtn').addEventListener('click', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (!confirm('确定清空所有数据？此操作不可撤销。')) return;
        localStorage.removeItem(STORAGE_KEYS.people);
        localStorage.removeItem(STORAGE_KEYS.projects);
        localStorage.removeItem(STORAGE_KEYS.tasks);
        renderAll();
      });

      preventFormSubmission(); // 防止表单提交（即便未来加了 <form> 也安全）

      // 初始渲染
      renderAll();
    }

    function seedData() {
      const people = [
        { id: uid('p'), name: '张三', role: '前端' },
        { id: uid('p'), name: '李四', role: '后端' },
        { id: uid('p'), name: '王五', role: '测试' },
      ];
      const projects = [
        { id: uid('prj'), name: 'Alpha', desc: '官网改版' },
        { id: uid('prj'), name: 'Beta', desc: '移动端' },
        { id: uid('prj'), name: 'Gamma', desc: '内部系统' },
      ];
      const today = new Date();
      const iso = (d) => new Date(d).toISOString().slice(0, 10);
      const tasks = [
        { id: uid('t'), personId: people[0].id, projectId: projects[0].id, date: iso(today), title: '首页样式优化' },
        { id: uid('t'), personId: people[0].id, projectId: projects[1].id, date: iso(today - 86400000 * 2), title: 'H5 表单' },
        { id: uid('t'), personId: people[1].id, projectId: projects[0].id, date: iso(today - 86400000 * 1), title: '接口联调' },
        { id: uid('t'), personId: people[1].id, projectId: projects[2].id, date: iso(today - 86400000 * 5), title: '权限服务' },
        { id: uid('t'), personId: people[2].id, projectId: projects[0].id, date: iso(today - 86400000 * 3), title: '回归测试' },
      ];
      saveAll({ people, projects, tasks });
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
